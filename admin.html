<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>DriveMatch Control Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
</head>
<body class="bg-gray-100 p-4">

    <div class="max-w-xl mx-auto">
        <div id="status-bar" class="bg-yellow-100 border-l-4 border-yellow-500 p-3 mb-5 text-sm">
            ⏳ กำลังตรวจสอบการเชื่อมต่อกับ Supabase...
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-md mb-8">
            <h2 class="text-xl font-bold mb-4">➕ ลงประกาศใหม่</h2>
            <form id="carForm" class="space-y-3">
                <input type="text" id="b" placeholder="ยี่ห้อ" class="w-full p-2 border rounded" required>
                <input type="text" id="m" placeholder="รุ่น" class="w-full p-2 border rounded" required>
                <div class="grid grid-cols-2 gap-2">
                    <input type="number" id="p" placeholder="ราคา" class="p-2 border rounded" required>
                    <input type="file" id="i" accept="image/*" class="p-2 text-xs" required>
                </div>
                <button type="submit" id="btnS" class="w-full bg-blue-600 text-white p-3 rounded-xl font-bold">บันทึกข้อมูล</button>
            </form>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-md">
            <h2 class="text-xl font-bold mb-4">📋 จัดการรถ</h2>
            <div id="display-list" class="space-y-2">
                </div>
        </div>
    </div>

    <script>
        // --- ส่วนการตั้งค่า (ห้ามมีเว้นวรรคแปลกๆ) ---
        const DB_URL = 'https://hidzzxxixaevdrnruzsm.supabase.co';
        const DB_KEY = 'sb_publishable_1X0s_-_4gdtKUkTIBq4xMw_KQ1EA5nT';
        const supabaseClient = supabase.createClient(DB_URL, DB_KEY);

        // ฟังก์ชันตรวจสอบสถานะ (ใหม่!)
        async function checkConn() {
            const bar = document.getElementById('status-bar');
            try {
                const { data, error } = await supabaseClient.from('cars').select('count');
                if (error) throw error;
                bar.className = "bg-green-100 border-l-4 border-green-500 p-3 mb-5 text-sm text-green-700";
                bar.innerHTML = "✅ เชื่อมต่อฐานข้อมูลสำเร็จ! พร้อมใช้งาน";
            } catch (e) {
                bar.className = "bg-red-100 border-l-4 border-red-500 p-3 mb-5 text-sm text-red-700";
                bar.innerHTML = "❌ กุญแจ API ผิดหรือยังไม่ได้รัน SQL: " + e.message;
            }
        }

        // ฟังก์ชันโหลดรายการ
        async function refresh() {
            const container = document.getElementById('display-list');
            const { data } = await supabaseClient.from('cars').select('*').order('created_at', {ascending: false});
            container.innerHTML = data.map(car => `
                <div class="flex justify-between items-center p-3 bg-gray-50 rounded-lg border">
                    <span class="text-sm font-medium">${car.brand} ${car.model}</span>
                    <button onclick="doDelete(${car.id})" class="text-red-500 text-xs font-bold border border-red-200 px-3 py-1 rounded-md hover:bg-red-50">ลบออก</button>
                </div>
            `).join('');
        }

        // ฟังก์ชันลบ (ผูกกับ window เพื่อความชัวร์)
        window.doDelete = async (id) => {
            if (!confirm('ยืนยันลบ?')) return;
            const { error } = await supabaseClient.from('cars').delete().eq('id', id);
            if (error) alert('ลบไม่ได้: ' + error.message);
            else { alert('ลบแล้ว!'); refresh(); }
        }

        // ระบบบันทึก
        document.getElementById('carForm').onsubmit = async (e) => {
            e.preventDefault();
            const b = document.getElementById('btnS');
            b.disabled = true; b.innerText = 'กำลังประมวลผล...';

            try {
                const file = document.getElementById('i').files[0];
                const comp = await imageCompression(file, { maxSizeMB: 0.1, maxWidthOrHeight: 800 });
                const name = `c-${Date.now()}.webp`;
                
                await supabaseClient.storage.from('car-images').upload(name, comp);
                const { data: url } = supabaseClient.storage.from('car-images').getPublicUrl(name);

                await supabaseClient.from('cars').insert([{
                    brand: document.getElementById('b').value,
                    model: document.getElementById('m').value,
                    price: document.getElementById('p').value,
                    image_url: url.publicUrl
                }]);

                alert('ลงประกาศสำเร็จ!');
                location.reload();
            } catch (err) {
                alert('พลาด: ' + err.message);
                b.disabled = false; b.innerText = 'บันทึกข้อมูล';
            }
        };

        // เริ่มทำงาน
        checkConn();
        refresh();
    </script>
</body>
</html>
