<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DriveMatch Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
</head>
<body class="bg-slate-50 font-sans">

    <div class="max-w-2xl mx-auto py-10 px-4">
        <div class="bg-white rounded-3xl shadow-xl overflow-hidden border mb-10">
            <div class="bg-blue-600 p-8 text-white">
                <h1 class="text-3xl font-bold">ลงประกาศรถใหม่</h1>
            </div>
            <form id="uploadForm" class="p-8 space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="brand" placeholder="ยี่ห้อ" class="p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500" required>
                    <input type="text" id="model" placeholder="รุ่น" class="p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500" required>
                </div>
                <div class="grid grid-cols-3 gap-4">
                    <input type="number" id="year" placeholder="ปี" class="p-3 bg-slate-50 border rounded-xl outline-none" required>
                    <input type="number" id="price" placeholder="ราคา" class="p-3 bg-slate-50 border rounded-xl outline-none" required>
                    <input type="number" id="mileage" placeholder="ไมล์" class="p-3 bg-slate-50 border rounded-xl outline-none" required>
                </div>
                <textarea id="description" placeholder="รายละเอียด" class="w-full p-3 bg-slate-50 border rounded-xl outline-none"></textarea>
                <input type="file" id="imageInput" accept="image/*" class="w-full p-3 border-2 border-dashed rounded-xl" required>
                <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition">ลงประกาศ</button>
            </form>
        </div>

        <div class="bg-white rounded-3xl shadow-xl p-8 border">
            <h2 class="text-2xl font-bold mb-6 italic">จัดการรถในระบบ</h2>
            <div id="admin-car-list" class="space-y-4">
                <p class="text-gray-400 italic">กำลังเชื่อมต่อฐานข้อมูล...</p>
            </div>
        </div>
    </div>

    <script>
        // ใส่รหัสของคุณ (ตรวจสอบให้เป๊ะนะครับ)
        const SB_URL = 'https://hidzzxxixaevdrnruzsm.supabase.co';
        const SB_KEY = 'sb_publishable_1X0s_-_4gdtKUkTIBq4xMw_KQ1EA5nT';
        const supa = supabase.createClient(SB_URL, SB_KEY);

        // 1. ฟังก์ชันดึงข้อมูลมาโชว์
        async function fetchCars() {
            const listDiv = document.getElementById('admin-car-list');
            try {
                const { data, error } = await supa.from('cars').select('*').order('created_at', { ascending: false });
                if (error) throw error;
                listDiv.innerHTML = data.length ? '' : 'ไม่มีรถในระบบ';
                data.forEach(car => {
                    const div = document.createElement('div');
                    div.className = "flex items-center justify-between p-4 bg-slate-50 rounded-2xl border border-slate-100";
                    div.innerHTML = `
                        <div class="flex items-center gap-4">
                            <img src="${car.image_url}" class="w-16 h-12 object-cover rounded-lg shadow-sm">
                            <div>
                                <p class="font-bold text-slate-800">${car.brand} ${car.model}</p>
                                <p class="text-blue-600 text-xs font-bold">฿${Number(car.price).toLocaleString()}</p>
                            </div>
                        </div>
                        <button onclick="window.requestDelete(${car.id})" class="bg-red-50 text-red-500 hover:bg-red-500 hover:text-white px-4 py-2 rounded-xl text-xs font-bold transition">ลบ</button>
                    `;
                    listDiv.appendChild(div);
                });
            } catch (err) {
                listDiv.innerHTML = 'โหลดข้อมูลไม่สำเร็จ: ' + err.message;
            }
        }

        // 2. ฟังก์ชันลบ (บังคับให้ผูกกับหน้าต่าง window เพื่อไม่ให้นิ่ง)
        window.requestDelete = async function(id) {
            console.log("กำลังจะลบ ID:", id); // เช็คใน Console ว่ากดติดไหม
            if (!confirm('ยืนยันว่าจะลบรถคันนี้ออกจากระบบใช่ไหม?')) return;
            
            try {
                const { error } = await supa.from('cars').delete().eq('id', id);
                if (error) throw error;
                alert('ลบข้อมูลเรียบร้อย!');
                fetchCars(); // โหลดรายการใหม่ทันที
            } catch (err) {
                alert('ลบไม่สำเร็จ: ' + err.message);
            }
        };

        // 3. ระบบส่งฟอร์ม (บันทึกข้อมูล)
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerHTML = 'กำลังบันทึก...';
            try {
                const img = document.getElementById('imageInput').files[0];
                const compressed = await imageCompression(img, { maxSizeMB: 0.2, maxWidthOrHeight: 1280 });
                const fName = `car-${Date.now()}.webp`;
                await supa.storage.from('car-images').upload(fName, compressed);
                const { data: url } = supa.storage.from('car-images').getPublicUrl(fName);
                
                await supa.from('cars').insert([{
                    brand: document.getElementById('brand').value,
                    model: document.getElementById('model').value,
                    year: parseInt(document.getElementById('year').value),
                    price: parseFloat(document.getElementById('price').value),
                    mileage: parseFloat(document.getElementById('mileage').value),
                    description: document.getElementById('description').value,
                    image_url: url.publicUrl
                }]);
                alert('สำเร็จ!'); location.reload();
            } catch (err) { alert('พลาด: ' + err.message); btn.disabled = false; btn.innerHTML = 'ลงประกาศ'; }
        });

        fetchCars();
    </script>
</body>
</html>
