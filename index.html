<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DriveMatch - แพลตฟอร์มรถยนต์พรีเมียม EEC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-600 tracking-tight">DRIVE<span class="text-gray-800">MATCH</span></h1>
            <div class="space-x-6 text-sm font-medium">
                <a href="#" class="hover:text-blue-600 transition">หน้าแรก</a>
                <a href="#" class="hover:text-blue-600 transition">เลือกซื้อรถ</a>
                <a href="#" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">ลงขายรถ</a>
            </div>
        </div>
    </nav>

    <header class="bg-white py-12 border-b">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <h2 class="text-4xl font-extrabold mb-4">ค้นหารถยนต์ที่ใช่ในเขต EEC</h2>
            <p class="text-gray-600 max-w-2xl mx-auto">แพลตฟอร์มคัดสรรรถยนต์มือสองสภาพดี พร้อมระบบตรวจสอบประวัติที่เชื่อถือได้</p>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-12">
        <div id="car-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="animate-pulse bg-gray-200 h-64 rounded-xl"></div>
            <div class="animate-pulse bg-gray-200 h-64 rounded-xl"></div>
            <div class="animate-pulse bg-gray-200 h-64 rounded-xl"></div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
